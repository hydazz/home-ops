---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: changedetection
spec:
  chartRef:
    kind: OCIRepository
    name: changedetection
  interval: 1h
  values:
    controllers:
      changedetection:
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/dgtlmoon/changedetection.io
              tag: 0.55.7@sha256:736331d2787f94d3201b64aa641e090f67e28577ba505bd7ba5d7c1841e1e0ca
            env:
              BASE_URL: "{{ .Release.Name }}.hyde.services"
              PLAYWRIGHT_DRIVER_URL: ws://localhost:3000/chrome?--disable-web-security=true&--user-data-dir=/cache
              PORT: &port 80
              TZ: Australia/Melbourne
              USE_X_SETTINGS: 1
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 256Mi
          browserless:
            image:
              repository: ghcr.io/browserless/chrome
              tag: v2.54.1@sha256:19aa4b30b9352f0ffb984d23221c9f9edc326caeb91f0d3c203f8c62374b15f4
            env:
              CHROME_REFRESH_TIME: 600000
              CONNECTION_TIMEOUT: 300000
              DEFAULT_STEALTH: true
              ENABLE_DEBUGGER: false
              MAX_CONCURRENT_SESSIONS: 10
              PREBOOT_CHROME: true
              SCREEN_DEPTH: 16
              SCREEN_HEIGHT: 1024
              SCREEN_WIDTH: 1920
            securityContext:
              allowPrivilegeEscalation: false
              #readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 1Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.hyde.services"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        advancedMounts:
          changedetection:
            app:
              - path: /datastore
      cache:
        existingClaim: "{{ .Release.Name }}-cache"
        advancedMounts:
          changedetection:
            browserless:
              - path: /cache
      tmp:
        type: emptyDir
